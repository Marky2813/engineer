<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    async function calculate(btnElement) {
      const a = document.getElementById("input-a").value;
      const b = document.getElementById("input-b").value;
      const result = await fetch("http://localhost:3000/cal", 
        {
          method: "POST",
          headers: {
          "Content-Type": "application/json", 
          "operation": btnElement.id, 
          },
          body: JSON.stringify({
            a: Number(a), 
            b: Number(b)
          })
        }
      )
      const val = await result.json();
      console.log(val)
      let upload = document.getElementById("result"); 
      upload.innerText = val.result; 
    }
  </script>
</head>
<body>
  <h2>Calculator</h2>
  <!-- //create a calculator which sends the request to our backend for the same using the post method and the fetch api.  -->
  <div>a: <input id="input-a" type="number" placeholder="enter a"></div>
  <div>b: <input id="input-b" type="number" placeholder="enter b"></div>
  <br>
  <button onclick="calculate(this)" id="sum">add</button>
  <button onclick="calculate(this)" id="sub">sub</button>
  <button onclick="calculate(this)" id="mul">mul</button>
  <button onclick="calculate(this)" id="div">div</button>

  <div id="result"></div>
</body>
</html>
